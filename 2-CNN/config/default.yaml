project:
  name: cnn-animales
  seed: 42

data:
  dataset_dir: ../dataset
  image_size: [32, 32]
  channels: 3
  validation_split: 0.2
  test_split: 0.2
  batch_size: 64
  shuffle: true

training:
  epochs: 40
  learning_rate: 0.005
  optimizer: sgd
  early_stopping: false
  patience: 5

model:
  type: baseline_cnn
  dropout: 0.5

output:
  artifacts_dir: artifacts
  models_dir: models
  logs_dir: logs
